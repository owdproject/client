packages:
  - desktop
  - apps/*
  - '!apps/*/playground'
  - packages/*
  - '!packages/*/playground'
  - themes/*
  - '!themes/*/playground'
  - plugins/*

catalog:
  typescript: ~6.0.3

blockExoticSubdeps: false

allowBuilds:
  '@owdproject/*': true
  '@owdproject/nx': true
  '@parcel/watcher': true
  '@swc/core': true
  better-sqlite3: true
  esbuild: true
  nx: true
  unrs-resolver: true

