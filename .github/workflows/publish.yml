name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure workspace packages for CI
        run: |
          echo -e "packages:\n  - packages/core\n  - packages/cli\ncatalog:\n  typescript: ~6.0.3" > pnpm-workspace.yaml
          cat pnpm-workspace.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare Nuxt modules (apps)
        run: pnpm run prepare:modules

      - name: Prepare Nuxt modules (themes)
        run: pnpm run prepare:themes

      - name: Prepare @owdproject/core module
        run: pnpm --filter @owdproject/core run dev:prepare

      - name: Build @owdproject/core module
        run: pnpm --filter @owdproject/core run build:module

      - name: Publish packages to NPM
        run: pnpm publish -r --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
