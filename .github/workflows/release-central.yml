name: Centralized Release Manager

on:
  repository_dispatch:
    types:
      - module_release

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ github.event.client_payload.name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout Core Repository (owd-client)
      - name: Checkout Core
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # Step 2: Checkout External Module (if triggered by a repository dispatch)
      - name: Checkout External Module
        if: github.event_name == 'repository_dispatch' && github.event.event_type == 'module_release'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          ref: ${{ github.event.client_payload.ref }}
          path: ${{ github.event.client_payload.type }}s/${{ github.event.client_payload.name }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || github.token }}

      # Step 3: Install PNPM
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      # Step 4: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Step 4.5: Recreate a minimal pnpm-workspace.yaml to isolate the build to only checked-out packages
      - name: Configure workspace packages for CI
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo -e "packages:\n  - packages/core\n  - packages/cli\n  - ${{ github.event.client_payload.type }}s/${{ github.event.client_payload.name }}\ncatalog:\n  typescript: ~6.0.3" > pnpm-workspace.yaml
          else
            echo -e "packages:\n  - packages/core\n  - packages/cli\ncatalog:\n  typescript: ~6.0.3" > pnpm-workspace.yaml
          fi
          cat pnpm-workspace.yaml

      # Step 5: Install dependencies (will run postinstall/prepare:stubs automatically)
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Step 6: Configure NPM authentication
      - name: Configure NPM Authentication
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Step 7: Publish packages to NPM registry
      - name: Publish to NPM
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
